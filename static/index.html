<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeedLite - Minimalist AI Reader</title>
    <meta name="description" content="FeedLite - AI-driven lightweight personal RSS reader">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <div class="login-header">
                <h2>Feedlite 🔐</h2>
                <p>Please login to access your feed</p>
            </div>
            <form id="login-form">
                <input type="text" id="login-user" placeholder="Username (admin)" required autocomplete="username">
                <input type="password" id="login-pass" placeholder="Password" required autocomplete="current-password">
                <button type="submit" class="btn-primary">Enter</button>
                <div id="login-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <!-- Main Header -->
    <header class="main-header">
        <div class="header-content">
            <h1 class="logo" id="logo-refresh" title="Click to refresh">FeedLite</h1>
            <div class="header-right">
                <form class="search-expandable" id="header-search" autocomplete="off" action="javascript:void(0);">
                    <input type="text" id="search-input" name="feedlite_search_field" placeholder="Search articles..." class="search-input" autocomplete="new-password" spellcheck="false" autocorrect="off">
                </form>
                <div class="actions" id="header-actions">
                    <button id="search-toggle" title="Search"><i data-lucide="search"></i></button>
                    <button id="nav-subs" title="Subscription Management"><i data-lucide="globe"></i></button>
                    <button id="nav-profile" title="AI Profile Settings"><i data-lucide="bot"></i></button>
                    <button id="theme-toggle" title="Toggle Theme"><i data-lucide="moon"></i></button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Feed Container -->
    <main class="feed-container" id="feed-stream">
        <div id="search-state" class="search-state hidden">
            <div class="search-state-copy">
                <span class="search-state-label">Searching for</span>
                <strong id="search-state-query"></strong>
            </div>
            <button id="clear-search" class="search-state-clear" type="button">Back to Feed</button>
        </div>

        <!-- Pull to Refresh Indicator -->
        <div id="pull-to-refresh" class="pull-indicator">
            <div class="spinner"></div>
            <span>Pull to refresh...</span>
        </div>

        <!-- Loading Indicator -->
        <div class="loading-trigger" id="loading">Loading...</div>
    </main>

    <!-- Modal: Subscription Center -->
    <div id="modal-subs" class="modal">
        <div class="modal-content wide-modal">
            <div class="modal-header">
                <div class="modal-tabs">
                    <button class="tab-btn active" data-tab="tab-add" title="Add New"><i data-lucide="bookmark-plus"></i></button>
                    <button class="tab-btn" data-tab="tab-list" title="My Subscriptions"><i data-lucide="clipboard-list"></i></button>
                </div>
                <span class="close-modal">&times;</span>
            </div>

            <!-- Tab 1: Add New Source -->
            <div id="tab-add" class="tab-pane active">
                <div class="subscription-list">
                    <div class="sub-item-card add-card">
                        <div class="sub-item-info">
                            <input type="text" placeholder="RSS URL (https://...)" id="new-sub-url"
                                class="minimal-input" autocomplete="off">
                        </div>
                        <div class="sub-item-actions">
                            <button id="preview-new-btn" class="btn-primary" title="Preview content"><i
                                    data-lucide="eye"></i></button>
                        </div>
                    </div>
                    <!-- Dynamic Preview Area -->
                    <div id="preview-container" class="preview-area hidden">
                        <div class="preview-header">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <span class="preview-title" id="preview-title-text"
                                    style="font-weight:600; font-size:0.9rem;">Content Preview</span>
                            </div>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div class="custom-select-wrapper" id="custom-category-dropdown">
                                    <div class="custom-select-trigger">
                                        <span class="custom-select-text">Select Category</span>
                                        <i class="custom-select-icon" data-lucide="chevron-down"></i>
                                    </div>
                                    <ul class="custom-select-options">
                                        <li data-value="1">News</li>
                                        <li data-value="2">Tech</li>
                                        <li data-value="3">Humanities</li>
                                        <li data-value="4">Design</li>
                                        <li data-value="5">General</li>
                                    </ul>
                                    <input type="hidden" id="new-sub-category" value="" required>
                                </div>
                                <button id="confirm-add-btn" class="btn-primary round-btn" title="Confirm Add"><i
                                        data-lucide="plus"></i></button>
                            </div>
                        </div>
                        <div class="preview-list"></div>
                    </div>
                </div>
            </div>

            <!-- Tab 2: My Subscriptions -->
            <div id="tab-list" class="tab-pane">
                <div class="subscription-list" id="my-subs-list">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: AI Profile -->
    <div id="modal-profile" class="modal">
        <div class="modal-content wide-modal">
            <div class="modal-header">
                <h3>AI User Profile</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-scroll-area">
                <!-- Persona Card (Read-only) -->
                <div class="sub-item-card prompt-card-container">
                    <div class="sub-item-info">
                        <span class="sub-name">AI Persona (Read-only)</span>
                        <textarea id="system-prompt-editor" rows="5"
                            class="minimal-textarea" readonly>The user profile will be automatically generated based on your likes/dislikes from the past week...</textarea>
                    </div>
                </div>

                <!-- Tags Card -->
                <div class="sub-item-card">
                    <div class="sub-item-info">
                        <span class="sub-name">Core Preference Tags</span>
                        <div class="tags-container" id="tags-list">
                            <!-- Tags will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button id="back-to-top" title="Back to top"><i data-lucide="arrow-up"></i></button>
    <script src="/app.js" charset="UTF-8"></script>
</body>

</html>
