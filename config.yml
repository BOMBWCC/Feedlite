# Feedlite 静态配置文件

# 抓取设置
fetch:
  interval_hours: 12        # 未设置 fixed_times_utc 时使用的抓取间隔（小时）
  fixed_times_utc: []       # 例如 [0, 12, 18]，表示每天 UTC 00:00 / 12:00 / 18:00 抓取；非空时优先于 interval_hours
  batch_size: 50            # AI 批处理每组篇数
  retention_hours: 12       # 历史遗弃窗口（丢弃早于此时间的文章）

# 用户画像调度（UTC）
profile:
  day_of_week: mon          # 每周几生成画像：mon/tue/wed/thu/fri/sat/sun
  hour_utc: 0               # 画像任务执行 UTC 小时
  minute_utc: 0             # 画像任务执行 UTC 分钟

# 网络代理 (针对部分 RSS 源或 AI API)
# 支持 http://user:pass@host:port 或 http://host:port
proxy:
  enable: false
  http_proxy: ""
  https_proxy: ""

# 系统安全
security:
  jwt_secret: "generate-a-strong-secret-here-for-production"
  access_token_expire_days: 7

# AI 模型配置 (默认占位，可在数据库中动态修改)
ai:
  default_provider: "openai"
  default_model: "gpt-3.5-turbo"

# 多语言翻译（默认值会在启动时同步到 app_config）
translation:
  enabled: true
  target_language: "zh-CN"
  translate_title: true
  translate_description: true
